<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pertamina Gas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8f9fa; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .login-card img { max-width: 150px; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9em; font-weight: 500; margin-bottom: 5px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        .form-group input:focus { border-color: var(--primary-blue); }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary-blue, #1A428A); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
        .error { color: #E53935; font-size: 0.9em; margin-bottom: 15px; background: #FFEBEE; padding: 10px; border-radius: 4px; }
        .back-link { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; color: var(--primary-blue); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
            <h2>Welcome Back</h2>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.95em;">Login to access full features</p>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
            <a href="{{ url_for('index') }}" class="back-link">← Back to Home</a>
        </div>
    </div>
</body>
</html>
